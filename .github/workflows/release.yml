name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd web
          rm -f package-lock.json
          npm i
          npm run build
          mkdir -p ../resource/public/html
          cp -r dist/* ../resource/public/html/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install GoFrame CLI
        run: go install github.com/gogf/gf/cmd/gf/v2@latest

      - name: Build binary
        run: |
          VERSION=$(cat VERSION)
          # 复制默认配置（config.yaml 被 gitignore，CI 中不存在）
          cp manifest/config/config.yaml.example manifest/config/config.yaml
          # 使用 gf build 进行交叉编译（自动打包资源 + 注入版本）
          gf build -n wekeep -v ${VERSION} \
            -a ${{ matrix.goarch }} -s ${{ matrix.goos }} \
            -p ./bin
          # 打包为 tar.gz
          cd ./bin/${VERSION}/${{ matrix.goos }}_${{ matrix.goarch }}
          tar -czf ../../../wekeep_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz wekeep*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wekeep_${{ matrix.goos }}_${{ matrix.goarch }}
          path: wekeep_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
